<!DOCTYPE html><html><head><title>Radar</title><script src="https://cdn.tailwindcss.com"></script></head><body class="bg-gray-100 p-8"><h1 class="text-3xl font-bold mb-6">Opportunity Radar</h1><div class="grid grid-cols-1 gap-6">{% for opp in opportunities %}<div class="bg-white p-6 rounded-lg shadow"><h2 class="text-xl font-semibold mb-2">{{ opp.idea }}</h2><p><strong>Business Model:</strong> {{ opp.model }}</p><p><strong>Target Customers:</strong> {{ opp.customers }}</p><p><strong>Monetization:</strong> {{ opp.monetization }}</p><p><strong>Score:</strong> {{ opp.score }}/100</p></div>{% endfor %}</div></body></html>
